services:
  # ── API Server (Node/Express) ──────────────────────────────────────────────
  - type: web
    name: lex-api
    env: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_BRIDGE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-5

  # ── Frontend (React/Vite — static site) ───────────────────────────────────
  - type: web
    name: lexsuite
    env: static
    buildCommand: pnpm install && pnpm --filter @workspace/lex-suite run build
    staticPublishPath: artifacts/lex-suite/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: VITE_API_URL
        value: https://lex-api-ievu.onrender.com
      - key: VITE_CLERK_PROXY_URL
        value: https://lex-api-ievu.onrender.com/api/__clerk
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
