services:
  - type: web
    name: lexsuite
    env: static
    buildCommand: pnpm install && pnpm --filter @workspace/lex-suite run build
    staticPublishPath: artifacts/lex-suite/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
