openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Lex Suite API - Legal AI assistant platform
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication and user operations
  - name: workflows
    description: Workflow management
  - name: sessions
    description: Analysis session management
  - name: documents
    description: Document/RAG operations
  - name: prompts
    description: Prompt template management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List all available workflows
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"

  /prompts/{key}:
    get:
      operationId: getPrompt
      tags: [prompts]
      summary: Get a prompt template by key
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Prompt template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PromptTemplate"
        "404":
          description: Prompt not found

  /sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List analysis sessions for current user
      security:
        - bearerAuth: []
      parameters:
        - name: module
          in: query
          schema:
            type: string
            enum: [executio, rural]
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"

    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new analysis session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a specific analysis session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"
        "404":
          description: Session not found

    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete an analysis session
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sessions/stats:
    get:
      operationId: getSessionStats
      tags: [sessions]
      summary: Get usage statistics for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionStats"

  /analyze:
    post:
      operationId: analyzeStream
      tags: [sessions]
      summary: Run AI analysis (streaming via SSE)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Streaming SSE response
          content:
            text/event-stream:
              schema:
                type: string
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Module not activated

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List uploaded documents for RAG
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document for RAG indexing
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadDocumentBody"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /modules:
    get:
      operationId: listUserModules
      tags: [auth]
      summary: List modules activated for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of activated modules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserModule"

  /api-config:
    get:
      operationId: getApiConfig
      tags: [auth]
      summary: Get API configuration (without secrets)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: API config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiConfig"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    UserProfile:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, user]
        activeModules:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - email
        - role
        - activeModules
        - createdAt

    Workflow:
      type: object
      properties:
        id:
          type: integer
        key:
          type: string
        name:
          type: string
        subtitle:
          type: string
        module:
          type: string
          enum: [executio, rural]
        category:
          type: ["string", "null"]
        promptKey:
          type: string
        fields:
          type: string
        sortOrder:
          type: integer
      required:
        - id
        - key
        - name
        - subtitle
        - module
        - promptKey
        - fields
        - sortOrder

    PromptTemplate:
      type: object
      properties:
        key:
          type: string
        content:
          type: string
        module:
          type: string
      required:
        - key
        - content
        - module

    Session:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        workflowKey:
          type: string
        module:
          type: string
          enum: [executio, rural]
        label:
          type: string
        mode:
          type: string
          enum: [form, paste, pdf]
        status:
          type: string
          enum: [idle, running, done, error]
        outputHtml:
          type: ["string", "null"]
        formData:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - userId
        - workflowKey
        - module
        - label
        - mode
        - status
        - createdAt
        - updatedAt

    CreateSessionBody:
      type: object
      properties:
        workflowKey:
          type: string
        module:
          type: string
          enum: [executio, rural]
        label:
          type: string
        mode:
          type: string
          enum: [form, paste, pdf]
        formData:
          type: ["string", "null"]
      required:
        - workflowKey
        - module
        - label
        - mode

    SessionStats:
      type: object
      properties:
        totalSessions:
          type: integer
        sessionsByModule:
          type: object
          properties:
            executio:
              type: integer
            rural:
              type: integer
          required:
            - executio
            - rural
        recentSessions:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        sessionsThisMonth:
          type: integer
      required:
        - totalSessions
        - sessionsByModule
        - recentSessions
        - sessionsThisMonth

    AnalyzeRequest:
      type: object
      properties:
        sessionId:
          type: integer
        workflowKey:
          type: string
        module:
          type: string
          enum: [executio, rural]
        formData:
          type: object
        pasteText:
          type: ["string", "null"]
        observations:
          type: ["string", "null"]
        continueFrom:
          type: ["string", "null"]
      required:
        - workflowKey
        - module

    Document:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        filename:
          type: string
        module:
          type: string
          enum: [executio, rural]
        status:
          type: string
          enum: [indexing, ready, error]
        chunkCount:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - userId
        - filename
        - module
        - status
        - chunkCount
        - createdAt

    UploadDocumentBody:
      type: object
      properties:
        filename:
          type: string
        content:
          type: string
        module:
          type: string
          enum: [executio, rural]
      required:
        - filename
        - content
        - module

    UserModule:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        module:
          type: string
          enum: [executio, rural]
        activatedAt:
          type: string
      required:
        - id
        - userId
        - module
        - activatedAt

    ApiConfig:
      type: object
      properties:
        anthropicConfigured:
          type: boolean
        availableModules:
          type: array
          items:
            type: string
        maxSessionsPerUser:
          type: integer
      required:
        - anthropicConfigured
        - availableModules
        - maxSessionsPerUser
