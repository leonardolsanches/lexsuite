kind = "web"
previewPath = "/"
title = "Lex Suite"
version = "1.0.0"
id = "artifacts/lex-suite"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20917

[services.development]
run = "pnpm --filter @workspace/lex-suite run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lex-suite", "run", "build" ]
publicDir = "artifacts/lex-suite/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20917"
BASE_PATH = "/"
